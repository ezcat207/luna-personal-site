          - link "2026-06-01 你每天在用的这五种\"网页产品\"，其实根本不是同一类东西 很多人开始做产品的第一句话是\"我想做一个网站\"。但\"网站\"其实不是一种产品，而是五种完全不同形态的统称：普通网站、Web App、PWA、浏览器插件、页面增强脚本（userscript）。选错了类型，你的功能可能根本实现不了，或者实现了用户也用不起来。本文从用户的日常视角出发，每种形态给你一个最简单的定义、一个最熟悉的例子、一个最火的产品——读完你就能在五分钟内判断自己该做哪一种。 产品设计 Web开发" [ref=e84] [cursor=pointer]:
